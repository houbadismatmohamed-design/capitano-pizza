<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capitano - Order Online</title>
    <style>
        :root { --primary: #1976d2; --background: #fdfdfd; --text: #333; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: var(--background); padding-bottom: 90px; }
        header { background: white; color: var(--primary); padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center;}
        header h1 { margin: 0; font-size: 20px; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .section-header { font-size: 14px; color: #7f8c8d; text-transform: uppercase; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; margin: 20px 0 10px; }
        .pizza-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        /* Updated Card and Sold Out Styles */
        .pizza-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #f0f0f0; text-align: center; transition: 0.3s; }
        .pizza-card.out { opacity: 0.6; filter: grayscale(1); }
        .pizza-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); background: #eee; }
        
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 20px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-out { background: #ccc; color: #666; border: none; padding: 10px; border-radius: 20px; width: 100%; font-weight: bold; cursor: not-allowed; }

        #cart-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px; box-sizing: border-box; border-radius: 20px 20px 0 0; display: none; z-index: 2000; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #eee; }
        .qty-btn { background: #eee; border: none; width: 25px; height: 25px; border-radius: 50%; }
        input, textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-confirm { background: #27ae60; color: white; width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <header><div>🏠</div><h1>🍕 Capitano Menu</h1><div onclick="toggleCart()">🛒</div></header>
    <div id="loading" style="text-align:center; padding:50px;">Loading Menu...</div>
    <div class="container" id="menu-list"></div>
    <div id="cart-panel">
        <div id="cart-items-display"></div>
        <div style="display:flex; justify-content:space-between; font-weight:bold; margin: 10px 0;"><span>Total:</span><span id="cart-summary-total">0.00 DA</span></div>
        <textarea id="order-note" placeholder="Any notes? (Extra cheese, etc)"></textarea>
        <input type="tel" id="cust-phone" placeholder="Your Phone Number">
        <button class="btn-confirm" onclick="confirmOrder()">Confirm Order</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBFsq2X7dNWDzUTM0YIXfocEwu98Ec8oSM",
        databaseURL: "https://capitano-13-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "capitano-13"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let cart = [];

    onValue(ref(db, 'pizzas'), (snap) => {
        document.getElementById('loading').style.display = 'none';
        const list = document.getElementById('menu-list');
        list.innerHTML = `<div class="section-header">Menu</div><div class="pizza-list" id="pizza-grid"></div>`;
        const grid = document.getElementById('pizza-grid');

        snap.forEach(child => {
            const p = child.val();
            const imgSrc = p.img ? p.img : "https://upload.wikimedia.org/wikipedia/commons/9/91/Pizza-3007395.jpg";
            
            // CHECK AVAILABILITY
            const isAvailable = p.available !== false; 

            grid.innerHTML += `
                <div class="pizza-card ${!isAvailable ? 'out' : ''}">
                    <img src="${imgSrc}" class="pizza-img">
                    <h3>${p.name}</h3>
                    <div style="font-weight:bold; margin-bottom:10px;">${p.price.toFixed(2)} DA</div>
                    ${isAvailable 
                        ? `<button class="btn-add" onclick="addToCart('${p.name}', ${p.price})">Add</button>` 
                        : `<button class="btn-out" disabled>Sold Out</button>`
                    }
                </div>`;
        });
    });

    window.toggleCart = () => { document.getElementById('cart-panel').style.display = (document.getElementById('cart-panel').style.display === 'block' ? 'none' : 'block'); };

    window.addToCart = (name, price) => {
        const item = cart.find(i => i.name === name);
        item ? item.qty++ : cart.push({name, price, qty: 1});
        updateCartUI();
        document.getElementById('cart-panel').style.display = 'block';
    };

    window.changeQty = (name, d) => {
        const i = cart.find(x => x.name === name);
        if(i) { i.qty += d; if(i.qty <= 0) cart = cart.filter(x => x.name !== name); }
        updateCartUI();
    };

    function updateCartUI() {
        const d = document.getElementById('cart-items-display');
        const totalEl = document.getElementById('cart-summary-total');
        d.innerHTML = ""; let total = 0;
        cart.forEach(i => {
            total += (i.price * i.qty);
            d.innerHTML += `<div class="cart-item"><span>${i.name}</span><div><button class="qty-btn" onclick="changeQty('${i.name}', -1)">-</button> ${i.qty} <button class="qty-btn" onclick="changeQty('${i.name}', 1)">+</button></div></div>`;
        });
        totalEl.innerText = total.toFixed(2) + " DA";
        if(cart.length === 0) document.getElementById('cart-panel').style.display = 'none';
    }

    window.confirmOrder = () => {
        const phone = document.getElementById('cust-phone').value;
        if(!phone || cart.length === 0) return alert("Details missing!");
        if(!confirm("Place order?")) return;

        push(ref(db, 'orders'), {
            phone, items_list: cart, note: document.getElementById('order-note').value,
            total: cart.reduce((s,i) => s+(i.price*i.qty), 0),
            status: "Pending", 
            timestamp: new Date().toLocaleTimeString(),
            reduction: 0 // Initialize reduction as 0 for the manager to modify later
        }).then(() => {
            alert("Success!"); cart = []; updateCartUI();
            document.getElementById('order-note').value = "";
            document.getElementById('cust-phone').value = "";
        });
    };
</script>
</body>
</html>
